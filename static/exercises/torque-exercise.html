/* ── TorqueLog (Main App) ──────────────────────────────────────── */
function TorqueLog() {
  const [config, setConfig] = useState(null);
  const [tab, setTab] = useState('brief');
  const [workStep, setWorkStep] = useState(1);
  const [step1Complete, setStep1Complete] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [score, setScore] = useState(null);

  useEffect(() => {
    if (window.EXERCISE_CONFIG) setConfig(window.EXERCISE_CONFIG);
  }, []);

  if (!config) return (
    <div style={{ fontFamily:mono, color:muted, display:'flex', alignItems:'center', justifyContent:'center', height:'100vh' }}>
      Loading exercise configuration\u2026
    </div>
  );

  const passed = score !== null && score >= (config.passing_score || 80);

  const Btn = ({ children, onClick, variant = 'primary', disabled = false }) => {
    const s = {
      primary: { background:amber, color:bg, border:'none' },
      ghost:   { background:'none', color:muted, border:`1px solid ${border}` },
      success: { background:green, color:bg, border:'none' },
    };
    return (
      <button onClick={onClick} disabled={disabled} style={{
        ...s[variant], padding:'10px 20px',
        cursor: disabled ? 'not-allowed' : 'pointer',
        fontFamily:mono, fontSize:'11px',
        letterSpacing:'0.12em', textTransform:'uppercase',
        fontWeight:600, opacity: disabled ? 0.4 : 1
      }}>{children}</button>
    );
  };

  const scenario = config.scenario;

  return (
    <div style={{
      fontFamily:mono, background:bg, color:textCol,
      height:'100vh', display:'flex', flexDirection:'column', fontSize:'13px'
    }}>
      {/* Header bar */}
      <div style={{
        background:surf, borderBottom:`1px solid ${border}`,
        padding:'10px 20px', display:'flex',
        justifyContent:'space-between', alignItems:'center', flexShrink:0
      }}>
        <div>
          <div style={{ color:amber, fontSize:'8px', letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:'2px' }}>
            FDQ Tier 2 \u00b7 Practical Exercise
          </div>
          <div style={{ color:white, fontSize:'16px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.06em' }}>
            Bolted Flange Torque Log
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:'16px' }}>
          {submitted && (
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize:'28px', fontWeight:900, color: passed ? green : red, lineHeight:1 }}>
                {score}%
              </div>
              <div style={{ fontSize:'8px', color: passed ? green : red, letterSpacing:'0.14em', textTransform:'uppercase' }}>
                {passed ? '\u2713 PASSED' : '\u2717 NOT PASSED'}
              </div>
            </div>
          )}
          <div style={{ display:'flex', borderLeft:`1px solid ${border}`, paddingLeft:'16px', gap:'4px' }}>
            {[['brief','Scenario'],['work','Work View']].map(([id, label]) => (
              <button key={id} onClick={() => setTab(id)} style={{
                background: tab === id ? 'rgba(212,131,42,0.12)' : 'none',
                border: `1px solid ${tab === id ? amber : border}`,
                color: tab === id ? amber : muted,
                cursor:'pointer', padding:'6px 14px',
                fontFamily:mono, fontSize:'9px',
                letterSpacing:'0.12em', textTransform:'uppercase'
              }}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Brief tab */}
      {tab === 'brief' && (
        <div style={{ flex:1, overflowY:'auto', padding:'20px', maxWidth:'860px', margin:'0 auto', width:'100%' }}>
          <div style={{
            background:surf, border:`1px solid ${border}`,
            borderLeft:`3px solid ${amber}`, padding:'18px 20px', marginBottom:'16px'
          }}>
            <div style={{ color:amber, fontSize:'9px', letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:'10px' }}>
              Exercise Brief
            </div>
            <p style={{ fontFamily:'sans-serif', fontSize:'14px', lineHeight:1.85, margin:0 }}>
              You are the QC Inspector on <strong style={{ color:white }}>{config.project}</strong>.
              {' '}Bolted flange assembly for <strong style={{ color:white }}>{config.system}</strong> is complete.
              {' '}Switch to <strong style={{ color:white }}>Work View</strong> to access the isometric drawing,
              {' '}individual joint torque forms, and Torque Specification \u2014 the Bill of Materials is embedded
              {' '}on the isometric drawing \u2014 all alongside the fillable log.
              {' '}Retrieve achieved torque values, gasket lot numbers, and all required data from the joint forms.
              {' '}Inspector: <strong style={{ color:white }}>{scenario.inspector}</strong> \u2014 enter initials as{' '}
              <strong style={{ color:white }}>J. REED</strong>.
            </p>
          </div>

          <div style={{
            background:surf, border:`1px solid ${border}`,
            display:'grid', gridTemplateColumns:'1fr 1fr', marginBottom:'20px'
          }}>
            {[['Project', scenario.project],['System', scenario.system],
              ['Specification', scenario.spec],['Torque Procedure', scenario.procedure],
              ['Fluid Service', scenario.service],['Gasket Lot #', scenario.gasketLot],
              ['Inspector on Record', scenario.inspector],['Bolt Material','ASTM A193 B7 / A194 2H']
            ].map(([l, v], i) => (
              <div key={l} style={{
                padding:'10px 14px', borderBottom:`1px solid ${border}`,
                borderRight: i % 2 === 0 ? `1px solid ${border}` : 'none',
                display:'flex', gap:'12px'
              }}>
                <div style={{ color:amber, fontSize:'8px', letterSpacing:'0.1em', textTransform:'uppercase', width:'120px', flexShrink:0 }}>{l}</div>
                <div style={{ color:white, fontSize:'12px' }}>{v}</div>
              </div>
            ))}
          </div>

          <Btn onClick={() => setTab('work')}>Open Work View \u2192</Btn>
        </div>
      )}

      {/* Work tab */}
      {tab === 'work' && (
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          {/* Step progress tabs */}
          <div style={{
            display:'flex', background:surf2,
            borderBottom:`1px solid ${border}`, flexShrink:0, padding:'0 16px'
          }}>
            {[
              ['1','Step 1 of 2 \u2014 Pre-Assembly Form','Fill MEP-QC-FORM-044A from spec, MTRs & drawing'],
              ['2','Step 2 of 2 \u2014 Torque Log','Record achieved torque values after assembly'],
            ].map(([num, label, desc], i) => (
              <div key={num}
                onClick={() => {
                  if (num === '2' && step1Complete) setWorkStep(2);
                  if (num === '1') setWorkStep(1);
                }}
                style={{
                  display:'flex', alignItems:'center', gap:'8px',
                  padding:'8px 16px',
                  cursor: num === '2' && !step1Complete ? 'not-allowed' : 'pointer',
                  opacity: num === '2' && !step1Complete ? 0.35 : 1,
                  borderBottom: workStep === parseInt(num) ? `2px solid ${amber}` : '2px solid transparent',
                  marginBottom:'-1px'
                }}
              >
                <div style={{
                  width:'18px', height:'18px', borderRadius:'50%',
                  background: workStep === parseInt(num) ? 'rgba(212,131,42,0.2)' : 'transparent',
                  border: `1px solid ${workStep === parseInt(num) ? amber : border}`,
                  display:'flex', alignItems:'center', justifyContent:'center'
                }}>
                  <span style={{
                    color: workStep === parseInt(num) ? amber : muted,
                    fontSize:'8px', fontWeight:700
                  }}>{num}</span>
                </div>
                <div>
                  <div style={{
                    color: workStep === parseInt(num) ? amber : muted,
                    fontSize:'8.5px', fontWeight:700, letterSpacing:'0.06em'
                  }}>{label}</div>
                  <div style={{ color:'#3a3d37', fontSize:'7px', letterSpacing:'0.04em' }}>{desc}</div>
                </div>
                {i === 0 && <div style={{ color:border, fontSize:'12px', marginLeft:'8px' }}>{'\u203a'}</div>}
              </div>
            ))}
          </div>

          {/* Split pane */}
          <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
            {/* Left pane (52%) */}
            <div style={{
              width:'52%', borderRight:`1px solid ${border}`,
              display:'flex', flexDirection:'column', overflow:'hidden'
            }}>
              <div style={{
                padding:'7px 12px', background:surf2,
                borderBottom:`1px solid ${border}`, flexShrink:0
              }}>
                <span style={{ color:muted, fontSize:'8px', letterSpacing:'0.14em', textTransform:'uppercase' }}>
                  {workStep === 1
                    ? 'MEP-QC-FORM-044A \u2014 FLG-001 \u00b7 Suction Nozzle N1'
                    : `Reference \u00b7 ${scenario.system}`}
                </span>
              </div>
              <div style={{ flex:1, overflowY:'auto', padding:'12px' }}>
                {workStep === 1
                  ? <PreAssemblyForm config={config} onComplete={() => { setStep1Complete(true); setWorkStep(2); }} />
                  : <RefPanel config={config} />
                }
              </div>
            </div>

            {/* Right pane */}
            <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
              {workStep === 1 ? (
                <>
                  <div style={{
                    padding:'7px 12px', background:surf2,
                    borderBottom:`1px solid ${border}`, flexShrink:0
                  }}>
                    <span style={{ color:muted, fontSize:'8px', letterSpacing:'0.14em', textTransform:'uppercase' }}>
                      Reference \u00b7 Spec / MTRs / Cal Cert / ISO Drawing
                    </span>
                  </div>
                  <div style={{ flex:1, overflow:'hidden' }}>
                    <RefPanel hideJointForms={true} config={config} />
                  </div>
                </>
              ) : (
                <>
                  <div style={{
                    padding:'7px 12px', background:surf2,
                    borderBottom:`1px solid ${border}`,
                    display:'flex', justifyContent:'space-between', alignItems:'center',
                    flexShrink:0
                  }}>
                    <span style={{ color:muted, fontSize:'8px', letterSpacing:'0.14em', textTransform:'uppercase' }}>
                      Torque Log \u00b7 TQ-44A
                    </span>
                  </div>
                  <div style={{ flex:1, overflowY:'auto', padding:'12px' }}>
                    <TorqueLogGrid config={config} onComplete={(s, p, data) => {
                      setScore(s);
                      setSubmitted(true);
                    }} />
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<TorqueLog />);
</script>
</body>
</html>
