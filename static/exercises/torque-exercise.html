<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FDQ Exercise — Torque Log</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #0e0f0d; overflow: hidden; }
</style>
<!-- Load config JSON for standalone testing. In Django, window.EXERCISE_CONFIG is injected by the template. -->
<script>
  if (!window.EXERCISE_CONFIG) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'torque-config.json', false);
    xhr.send();
    if (xhr.status === 200) window.EXERCISE_CONFIG = JSON.parse(xhr.responseText);
  }
</script>
</head>
<body>
<div id="root" style="height:100%;"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ── Design Tokens ────────────────────────────────────────────── */
const bg      = '#0e0f0d';
const surf    = '#161714';
const surf2   = '#1d1f1b';
const border  = '#2a2d27';
const textCol = '#ccc8be';
const muted   = '#6e6b63';
const white   = '#ede8df';
const amber   = '#d4832a';
const green   = '#52a366';
const red     = '#c95f5f';
const steel   = '#3a556a';
const mono    = "'IBM Plex Mono', monospace";

/* ── Tooltip CSS injection ────────────────────────────────────── */
(() => {
  if (document.getElementById('fdq-tooltip-style')) return;
  const s = document.createElement('style');
  s.id = 'fdq-tooltip-style';
  s.textContent = `
    .tip-wrap { position: relative; display: inline-flex; align-items: center; }
    .tip-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 13px; height: 13px; border-radius: 50%;
      background: #1a3040; border: 1px solid #3a5a6a;
      color: #7a9db0; font-size: 8px; font-weight: 700;
      cursor: default; flex-shrink: 0; margin-left: 5px;
      font-style: normal; line-height: 1; font-family: ${mono};
      user-select: none;
    }
    .tip-icon:hover { background: #243a48; border-color: #7a9db0; color: #a0c4d4; }
    .tip-box {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%; transform: translateX(-50%);
      min-width: 220px; max-width: 280px;
      background: #1a2a34;
      border: 1px solid #3a5a6a;
      border-left: 2px solid #7a9db0;
      padding: 6px 9px;
      font-size: 7.5px; color: #a0c4d4;
      line-height: 1.6; font-style: italic;
      font-family: ${mono};
      z-index: 200; pointer-events: none;
      white-space: normal; word-break: break-word;
    }
    .tip-box::after {
      content: ''; position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #3a5a6a;
    }
    .tip-wrap:hover .tip-box { display: block; }
  `;
  document.head.appendChild(s);
})();

/* ── Config from host page ────────────────────────────────────── */
const CFG = window.EXERCISE_CONFIG;

/* ── checkFormField() — uses config.steps[0].flexible_matchers ─ */
function checkFormField(key, userVal, correctVal, flexibleMatchers) {
  const u = userVal.trim().toUpperCase();
  const c = correctVal.trim().toUpperCase();
  const matcher = flexibleMatchers && flexibleMatchers[key];
  if (!matcher) return u === c;

  if (matcher.type === 'contains_any') {
    return matcher.values.some(v => u.includes(v.toUpperCase()));
  }
  if (matcher.type === 'contains_all') {
    return matcher.values.every(v => u.includes(v.toUpperCase()));
  }
  if (matcher.type === 'contains_all_any') {
    return matcher.groups.every(group =>
      group.some(v => u.includes(v.toUpperCase()))
    );
  }
  return u === c;
}

/* ── MTRPanel ─────────────────────────────────────────────────── */
function MTRPanel({ mtrs }) {
  const [active, setActive] = useState('bolts');

  const tabs = [
    ['bolts',    'Bolts (' + (mtrs.bolts.spec || '').split('/')[0].trim().replace('ASTM ','') + ' ' + (mtrs.bolts.grade || '').replace('Grade ','') + ')'],
    ['nuts',     'Nuts (' + (mtrs.nuts.spec || '').split('/')[0].trim().replace('ASTM ','') + ' ' + (mtrs.nuts.grade || '').replace('Grade ','') + ')'],
    ['flangesA', 'Flanges Heat A'],
    ['flangesB', 'Flanges Heat B'],
    ['gaskets',  'Gasket Cert'],
  ];

  const m = mtrs[active];

  const MtrTable = ({ data }) => (
    <table style={{ borderCollapse:'collapse', width:'100%', fontSize:'8.5px', marginTop:'4px', marginBottom:'8px' }}>
      <thead>
        <tr style={{ background:'#111410' }}>
          {data[0].map((h, i) => (
            <th key={i} style={{
              padding:'4px 7px', textAlign:'left', color:amber,
              fontSize:'7.5px', letterSpacing:'0.08em', textTransform:'uppercase',
              borderBottom:`1px solid ${border}`,
              borderRight: i < data[0].length - 1 ? `1px solid ${border}` : 'none',
              fontWeight:700
            }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {data.slice(1).map((row, ri) => (
          <tr key={ri} style={{ background: ri % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)' }}>
            {row.map((cell, ci) => (
              <td key={ci} style={{
                padding:'4px 7px',
                color: ci === 0 ? muted : (ri === data.length - 2 && ci > 0 ? '#8ec89a' : textCol),
                fontSize:'8.5px',
                borderBottom:'1px solid #1a1c18',
                borderRight: ci < row.length - 1 ? `1px solid ${border}` : 'none',
                fontWeight: ci === 0 ? '600' : '400'
              }}>{cell}</td>
            ))}
          </tr>
        ))}
      </tbody>
    </table>
  );

  const Field = ({ label, value, hi = false, green: isGreen = false }) => (
    <div style={{ display:'grid', gridTemplateColumns:'130px 1fr', borderBottom:'1px solid #1a1c18', minHeight:'22px' }}>
      <div style={{
        padding:'4px 8px', background:surf2, color:textCol,
        fontSize:'7.5px', letterSpacing:'0.07em', textTransform:'uppercase',
        borderRight:`1px solid ${border}`, display:'flex', alignItems:'center'
      }}>{label}</div>
      <div style={{
        padding:'4px 8px',
        color: isGreen ? '#52a366' : hi ? white : textCol,
        fontSize: hi ? '9.5px' : '8.5px',
        fontWeight: hi ? '700' : '400',
        display:'flex', alignItems:'center'
      }}>{value}</div>
    </div>
  );

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'0' }}>
      {/* Sub-tab bar */}
      <div style={{ display:'flex', flexWrap:'wrap', borderBottom:`1px solid ${border}`, marginBottom:'10px' }}>
        {tabs.map(([id, label]) => (
          <button key={id} onClick={() => setActive(id)} style={{
            background: active === id ? 'rgba(212,131,42,0.1)' : 'none',
            border:'none',
            borderBottom: active === id ? `2px solid ${amber}` : '2px solid transparent',
            color: active === id ? amber : muted,
            cursor:'pointer', padding:'6px 10px', fontFamily:mono,
            fontSize:'7.5px', letterSpacing:'0.1em', textTransform:'uppercase'
          }}>{label}</button>
        ))}
      </div>

      {/* MTR body */}
      <div style={{ border:`1px solid ${border}`, background:surf }}>
        {/* Title bar */}
        <div style={{ background:'rgba(212,131,42,0.08)', borderBottom:`1px solid ${border}`, padding:'8px 10px' }}>
          <div style={{ color:amber, fontSize:'9px', fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase' }}>
            {m.title}
          </div>
          <div style={{ color:muted, fontSize:'7.5px', marginTop:'2px' }}>{m.manufacturer}</div>
        </div>

        {/* Two-column header fields */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', borderBottom:`1px solid ${border}` }}>
          <div style={{ borderRight:`1px solid ${border}` }}>
            <Field label="Cert / Lot No." value={active === 'gaskets' ? m.lotNo : m.certNo} hi green />
            <Field label="Specification" value={m.spec} hi />
            <Field label="Grade" value={m.grade} hi />
            <Field label={active === 'gaskets' ? 'Lot No.' : 'Heat No.'} value={active === 'gaskets' ? m.lotNo : m.heatNo} hi />
          </div>
          <div>
            <Field label="PO No." value={m.poNo} />
            <Field label="Job No." value={m.jobNo} />
            <Field label="Product" value={m.product} />
            <Field label={active === 'gaskets' ? '' : 'Heat Treatment'} value={active === 'gaskets' ? '' : m.heatTreatment} />
          </div>
        </div>

        {/* Body: sizes, chemistry, mechanical */}
        <div style={{ padding:'8px 10px' }}>
          {/* Sizes - always shown */}
          <div style={{ color:amber, fontSize:'7.5px', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'4px' }}>
            Sizes / Quantities Covered
          </div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:'4px', marginBottom:'10px' }}>
            {m.sizes.map(s => (
              <span key={s} style={{
                background:'#111410', border:`1px solid ${border}`,
                color:textCol, fontSize:'8px', padding:'2px 8px'
              }}>{s}</span>
            ))}
          </div>

          {/* Chemistry / Materials table */}
          {active === 'gaskets' ? (
            <>
              <div style={{ color:amber, fontSize:'7.5px', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'2px' }}>
                Materials
              </div>
              <MtrTable data={m.chemistry} />
              <div style={{ color:amber, fontSize:'7.5px', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'2px' }}>
                Performance Properties
              </div>
              <MtrTable data={m.mechanical} />
            </>
          ) : (
            <>
              <div style={{ color:amber, fontSize:'7.5px', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'2px' }}>
                Chemical Analysis (%)
              </div>
              <MtrTable data={m.chemistry} />
              <div style={{ color:amber, fontSize:'7.5px', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'2px' }}>
                Mechanical Properties
              </div>
              <MtrTable data={m.mechanical} />
            </>
          )}

          {/* Sour service badge */}
          {m.sourNote && (
            <div style={{
              background:'rgba(82,163,102,0.08)', border:'1px solid rgba(82,163,102,0.25)',
              padding:'6px 8px', marginBottom:'8px', fontSize:'8.5px', color:'#a0d4a8'
            }}>
              <span style={{ color:'#52a366', fontWeight:700, marginRight:'6px' }}>{'\u2713'} SOUR SERVICE</span>
              {m.sourNote}
            </div>
          )}

          {/* Certification statement */}
          <div style={{ background:'#0d100b', border:`1px solid ${border}`, padding:'8px 10px', marginBottom:'6px' }}>
            <div style={{ color:muted, fontSize:'7.5px', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:'3px' }}>
              Certification Statement
            </div>
            <div style={{ color:textCol, fontSize:'8.5px', lineHeight:1.6, fontStyle:'italic' }}>
              {m.certification}
            </div>
          </div>

          {/* Certified By / Date */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0' }}>
            <div style={{ padding:'4px 0' }}>
              <span style={{ color:muted, fontSize:'7.5px', letterSpacing:'0.08em', textTransform:'uppercase' }}>Certified By: </span>
              <span style={{ color:white, fontSize:'8.5px' }}>{m.certifiedBy}</span>
            </div>
            <div style={{ padding:'4px 0', textAlign:'right' }}>
              <span style={{ color:muted, fontSize:'7.5px', letterSpacing:'0.08em', textTransform:'uppercase' }}>Cert Date: </span>
              <span style={{ color:white, fontSize:'8.5px' }}>{m.certDate}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── CalCertPanel ─────────────────────────────────────────────── */
function CalCertPanel({ calCert }) {
  const c = calCert;

  const Field = ({ label, value, hi = false, accent = false, warn = false }) => (
    <div style={{ display:'grid', gridTemplateColumns:'160px 1fr', borderBottom:'1px solid #1a1c18', minHeight:'22px' }}>
      <div style={{
        padding:'4px 8px', background:surf2, color:textCol,
        fontSize:'7.5px', letterSpacing:'0.07em', textTransform:'uppercase',
        borderRight:`1px solid ${border}`, display:'flex', alignItems:'center'
      }}>{label}</div>
      <div style={{
        padding:'4px 8px',
        color: warn ? '#c95f5f' : accent ? amber : hi ? white : textCol,
        fontSize: hi ? '9.5px' : '8.5px',
        fontWeight: hi ? '700' : '400',
        display:'flex', alignItems:'center'
      }}>{value}</div>
    </div>
  );

  return (
    <div>
      <div style={{ border:`1px solid ${border}`, background:surf }}>
        {/* Header with status badge */}
        <div style={{
          background:'rgba(212,131,42,0.08)', borderBottom:`2px solid ${amber}`,
          padding:'8px 10px', display:'flex', justifyContent:'space-between', alignItems:'center'
        }}>
          <div>
            <div style={{ color:amber, fontSize:'9px', fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase' }}>
              CALIBRATION CERTIFICATE
            </div>
            <div style={{ color:muted, fontSize:'7.5px', marginTop:'2px' }}>{c.calBy}</div>
          </div>
          <div style={{ background:'rgba(82,163,102,0.15)', border:'1px solid rgba(82,163,102,0.4)', padding:'4px 10px' }}>
            <div style={{ color:'#52a366', fontSize:'8px', fontWeight:700, letterSpacing:'0.1em' }}>
              {c.status}
            </div>
          </div>
        </div>

        {/* Two-column instrument info */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', borderBottom:`1px solid ${border}` }}>
          <div style={{ borderRight:`1px solid ${border}` }}>
            <Field label="Instrument ID" value={c.instrumentId} hi accent />
            <Field label="Description" value={c.description} hi />
            <Field label="Manufacturer" value={c.manufacturer} />
            <Field label="Model No." value={c.model} />
            <Field label="Serial No." value={c.serialNo} />
          </div>
          <div>
            <Field label="Cert No." value={c.certNo} />
            <Field label="Calibration Date" value={c.calDate} />
            <Field label="Calibration Due" value={c.calDue} hi accent />
            <Field label="Range" value={c.range} />
            <Field label="Accuracy" value={c.accuracy} />
          </div>
        </div>

        {/* Procedure / standard / by / tech */}
        <div style={{ borderBottom:`1px solid ${border}` }}>
          <Field label="Cal Procedure" value={c.calProcedure} />
          <Field label="Reference Standard" value={c.calStandard} />
          <Field label="Calibrated By" value={c.calBy} />
          <Field label="Cal Technician" value={c.calTech} />
        </div>

        {/* Results table */}
        <div style={{ padding:'10px' }}>
          <div style={{ color:amber, fontSize:'7.5px', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'6px' }}>
            Calibration Results — As Found / As Left
          </div>
          <table style={{ borderCollapse:'collapse', width:'100%', fontSize:'8.5px', marginBottom:'10px' }}>
            <thead>
              <tr style={{ background:'#111410' }}>
                {['Test Point', 'Applied (Reference)', 'Indicated (Wrench)', 'Error', 'Result'].map((h, i) => (
                  <th key={i} style={{
                    padding:'4px 8px', textAlign:'left', color:amber,
                    fontSize:'7px', letterSpacing:'0.08em', textTransform:'uppercase',
                    borderBottom:`1px solid ${border}`,
                    borderRight: i < 4 ? `1px solid ${border}` : 'none',
                    fontWeight:700
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {c.results.map((row, i) => (
                <tr key={i} style={{ background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)' }}>
                  {row.map((cell, ci) => (
                    <td key={ci} style={{
                      padding:'4px 8px',
                      color: ci === 4 ? '#52a366' : ci === 3 ? textCol : ci === 0 ? muted : textCol,
                      fontSize:'8.5px',
                      fontWeight: ci === 4 ? '700' : '400',
                      borderBottom:'1px solid #1a1c18',
                      borderRight: ci < 4 ? `1px solid ${border}` : 'none'
                    }}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>

          {/* Next cal note */}
          <div style={{
            background:'rgba(212,131,42,0.06)', border:'1px solid rgba(212,131,42,0.2)',
            borderLeft:`3px solid ${amber}`, padding:'7px 10px',
            fontSize:'8.5px', color:textCol, lineHeight:1.6
          }}>
            <span style={{ color:amber, fontWeight:700, marginRight:'6px' }}>NOTE:</span>
            {c.nextCalNote}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── JointForm ────────────────────────────────────────────────── */
function JointForm({ f, system, spec }) {
  const Row = ({ label, value, hi = false, accent = false }) => (
    <div style={{ display:'flex', borderBottom:`1px solid ${border}`, minHeight:'26px' }}>
      <div style={{
        width:'148px', flexShrink:0, padding:'5px 8px',
        background:surf2, color:textCol, fontSize:'8px',
        letterSpacing:'0.08em', textTransform:'uppercase',
        borderRight:`1px solid ${border}`, display:'flex', alignItems:'center'
      }}>{label}</div>
      <div style={{
        flex:1, padding:'5px 8px',
        color: accent ? amber : hi ? white : textCol,
        fontSize: hi ? '12px' : '10px',
        fontWeight: hi ? 700 : 400,
        display:'flex', alignItems:'center'
      }}>{value}</div>
    </div>
  );

  const Divider = ({ label }) => (
    <div style={{
      padding:'5px 8px', background:'rgba(212,131,42,0.07)',
      borderBottom:`1px solid ${border}`, borderTop:`1px solid ${border}`,
      color:amber, fontSize:'7.5px', letterSpacing:'0.16em',
      textTransform:'uppercase', marginTop:'2px'
    }}>{label}</div>
  );

  return (
    <div style={{ border:`1px solid ${border}`, background:surf }}>
      {/* Header */}
      <div style={{
        background:'rgba(212,131,42,0.12)', borderBottom:`2px solid ${amber}`,
        padding:'8px 12px', display:'flex', justifyContent:'space-between', alignItems:'center'
      }}>
        <div>
          <div style={{ color:amber, fontSize:'11px', fontWeight:700, letterSpacing:'0.06em' }}>
            {f.id} {'\u2014'} {f.location}
          </div>
          <div style={{ color:muted, fontSize:'8px', letterSpacing:'0.1em', textTransform:'uppercase', marginTop:'2px' }}>
            {f.size} {'\u00B7'} {f.cls} {'\u00B7'} {system} {'\u00B7'} {spec}
          </div>
        </div>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontSize:'9px', color:muted, letterSpacing:'0.1em', textTransform:'uppercase' }}>Result</div>
          <div style={{ fontSize:'16px', fontWeight:900, color: f.result === 'ACC' ? green : red, letterSpacing:'0.08em' }}>
            {f.result}
          </div>
        </div>
      </div>

      {/* Torque summary bar */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr', borderBottom:`1px solid ${border}` }}>
        {[
          ['Target', f.targetTorque + ' ft-lb', amber],
          ['Snug Pass', f.snugTorque + ' ft-lb', '#8ab4c4'],
          ['Mid Pass', f.midTorque + ' ft-lb', '#8ab4c4'],
          ['Final Pass', f.finalTorque + ' ft-lb', amber],
          ['Achieved', f.achievedTorque + ' ft-lb', green],
        ].map(([label, val, color]) => (
          <div key={label} style={{ padding:'8px 10px', borderRight:`1px solid ${border}`, textAlign:'center' }}>
            <div style={{ color:muted, fontSize:'7px', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'3px' }}>
              {label}
            </div>
            <div style={{ color, fontSize:'13px', fontWeight:700 }}>{val}</div>
          </div>
        ))}
      </div>

      {/* Bolt & Nut Data */}
      <Divider label="Bolt & Nut Data" />
      <Row label="Bolt Size / Length" value={f.boltSize} hi />
      <Row label="Bolt Qty" value={f.boltQty + ' bolts'} />
      <Row label="Bolt Material" value={f.boltMat} />
      <Row label="Bolt Heat No." value={f.boltHeat} />
      <Row label="Bolt Cert No." value={f.boltCert} accent />
      <Row label="Nut Material" value={f.nutMat} />
      <Row label="Nut Cert No." value={f.nutCert} accent />

      {/* Gasket Data */}
      <Divider label="Gasket Data" />
      <Row label="Gasket Type" value={f.gasketType} hi />
      <Row label="Gasket Std" value={f.gasketStd} />
      <Row label="Gasket Lot #" value={f.gasketLot} accent />

      {/* Flange Data */}
      <Divider label="Flange Data" />
      <Row label="Flange Material" value={f.flangeMat} />
      <Row label="Flange Heat No." value={f.flangeHeat} />
      <Row label="Flange Cert No." value={f.flangeCert} accent />
      <Row label="Surface Finish" value={f.surfaceFinish} />
      <Row label="Alignment Check" value={f.alignmentCheck} hi />

      {/* Installation */}
      <Divider label="Installation" />
      <Row label="Lubricant" value={f.lubricant} />
      <Row label="Bolt Engagement" value={f.boltEngagement} />
      <Row label="Pattern" value={f.pattern} hi />
      <Row label="Passes" value={f.passes} hi />
      <Row label="Gasket Condition" value={f.gasketCondition} />

      {/* Inspection Record */}
      <Divider label="Inspection Record" />
      <Row label="Date" value={f.date} />
      <Row label="Shift" value={f.shift} />
      <Row label="Torque Wrench ID" value={f.wrenchId} />
      <Row label="Wrench Cal. Due" value={f.wrenchCalDue} />
      <Row label="Inspector" value={f.inspector} />
      <Row label="Initials" value={f.initials} hi accent />

      {/* Remarks */}
      <div style={{ padding:'8px 10px', borderTop:`1px solid ${border}` }}>
        <div style={{ color:muted, fontSize:'7.5px', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'4px' }}>
          Remarks
        </div>
        <div style={{ color:textCol, fontSize:'10px', lineHeight:1.6 }}>{f.remarks}</div>
      </div>
    </div>
  );
}

/* ── IsoMap ───────────────────────────────────────────────────── */
function IsoMap({ config }) {
  const bom = config.reference_docs.iso_drawing.bom_rows;
  return (
    <svg viewBox="0 0 920 638" width="100%" style={{ display:'block', fontFamily:"IBM Plex Mono, monospace" }}>
      {/* Background */}
      <rect width="920" height="490" fill="#0a0b09"/>

      {/* Grid lines */}

            <div style={{ color:muted, fontSize:'7.5px', marginTop:'1px' }}>{date}</div>
          </div>
        ))}
      </div>
    </div>
  );

  const Section = ({ num, title, children }) => (
    <div style={{ marginBottom:'14px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:'8px', padding:'6px 10px', background:'rgba(212,131,42,0.07)', borderLeft:`2px solid ${amber}`, borderBottom:`1px solid ${border}`, marginBottom:'0' }}>
        <span style={{ color:amber, fontSize:'9px', fontWeight:700, letterSpacing:'0.14em', minWidth:'28px' }}>{num}</span>
        <span style={{ color:white, fontSize:'9.5px', fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase' }}>{title}</span>
      </div>
      <div style={{ border:`1px solid ${border}`, borderTop:'none', padding:'10px 12px', background:surf }}>
        {children}
      </div>
    </div>
  );

  const Clause = ({ id, children, warn = false, note = false }) => (
    <div style={{ display:'flex', gap:'10px', marginBottom:'7px', paddingBottom:'7px', borderBottom:'1px solid #1a1c18' }}>
      <span style={{ color: warn ? red : note ? '#8ab4c4' : muted, fontSize:'8px', fontWeight:700, minWidth:'36px', paddingTop:'1px', flexShrink:0, letterSpacing:'0.06em' }}>{id}</span>
      <span style={{ color: warn ? '#e8b4b0' : note ? '#b4ccd4' : textCol, fontSize:'10px', lineHeight:1.65, fontStyle: note ? 'italic' : 'normal' }}>{children}</span>
    </div>
  );

  const TableNote = ({ children }) => (
    <div style={{ color:'#8ab4c4', fontSize:'8.5px', fontStyle:'italic', marginTop:'5px', lineHeight:1.5, paddingLeft:'4px', borderLeft:'1px solid #2a4050' }}>
      {children}
    </div>
  );

  const Warn = ({ children }) => (
    <div style={{ background:'rgba(201,95,95,0.08)', border:'1px solid rgba(201,95,95,0.25)', borderLeft:'3px solid #c95f5f', padding:'7px 10px', marginBottom:'10px', marginTop:'4px' }}>
      <span style={{ color:'#c95f5f', fontSize:'8px', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', marginRight:'8px' }}>{'\u26A0'} WARNING</span>
      <span style={{ color:'#e8b4b0', fontSize:'9.5px' }}>{children}</span>
    </div>
  );

  const specTable = (headers, rows, colColors = []) => (
    <table style={{ borderCollapse:'collapse', width:'100%', fontSize:'9.5px', marginTop:'8px', marginBottom:'4px' }}>
      <thead>
        <tr style={{ background:'#111410' }}>
          {headers.map((h, i) => (
            <th key={i} style={{
              padding:'5px 8px', textAlign:'left', color: colColors[i] || amber,
              fontSize:'7.5px', letterSpacing:'0.1em', textTransform:'uppercase',
              borderBottom:`1px solid ${border}`,
              borderRight: i < headers.length - 1 ? `1px solid ${border}` : 'none',
              fontWeight:700
            }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {rows.map((row, ri) => (
          <tr key={ri} style={{ background: ri % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.018)' }}>
            {row.map((cell, ci) => (
              <td key={ci} style={{
                padding:'5px 8px',
                color: ci === 0 ? white : (ci === row.length - 1 && colColors[ci] === green ? green : textCol),
                fontSize: ci === 0 ? '10px' : '9.5px',
                fontWeight: ci === 0 ? '700' : '400',
                borderBottom:'1px solid #1a1c18',
                borderRight: ci < row.length - 1 ? `1px solid ${border}` : 'none'
              }}>{cell}</td>
            ))}
          </tr>
        ))}
      </tbody>
    </table>
  );

  return (
    <div style={{ fontFamily:mono, fontSize:'10px', lineHeight:1.6, color:textCol }}>
      <DocHeader/>
      <div style={{ padding:'12px 0 0 0' }}>

        <Section num="1.0" title="Purpose & Scope">
          <Clause id="1.1">
            This specification establishes the minimum requirements for the assembly, lubrication, torquing, and inspection of bolted flange connections on piping systems designed and constructed under ASME B31.3 <em>(Process Piping)</em> and ASME B31.8 <em>(Gas Transmission and Distribution Piping)</em> within Mustang Energy Partners, LLC facilities and projects.
          </Clause>
          <Clause id="1.2">
            This specification applies to all ASME B16.5 flanged connections in Class 150 through Class 2500 service, including but not limited to: natural gas, condensate, produced water, sour service (H{'\u2082'}S partial pressure {'>'}0.0003 MPa), and hydrocarbon liquid service.
          </Clause>
          <Clause id="1.3">
            Compliance with this specification is mandatory. Where conflicts exist between this document and referenced codes, the more stringent requirement shall govern. Conflicts shall be referred to the designated QC Authority for resolution prior to proceeding.
          </Clause>
          <Clause id="1.4" note>
            Note: This specification supplements, and does not replace, the requirements of ASME PCC-1 <em>Guidelines for Pressure Boundary Bolted Flange Joint Assembly</em>. Personnel performing flange assembly shall be familiar with the current edition of ASME PCC-1.
          </Clause>
        </Section>

        <Section num="2.0" title="Referenced Standards & Documents">
          {specTable(
            ['Document','Title','Edition / Note'],
            [
              ['ASME B31.3','Process Piping','Current edition'],
              ['ASME B31.8','Gas Transmission & Distribution Piping Systems','Current edition'],
              ['ASME B16.5','Pipe Flanges and Flanged Fittings NPS \u00BD through 24','Current edition'],
              ['ASME B16.20','Metallic Gaskets for Pipe Flanges','Current edition'],
              ['ASME PCC-1','Guidelines for Pressure Boundary Bolted Flange Joint Assembly','Current edition'],
              ['ASTM A193','Standard Specification for Alloy-Steel and SS Bolting for High-Temp or High-Pressure Service','Grade B7 applies'],
              ['ASTM A194','Standard Specification for Carbon and Alloy Steel Nuts for Bolts for High-Pressure or High-Temp Service','Grade 2H applies'],
              ['NACE MR0175 / ISO 15156','Petroleum and Natural Gas Industries \u2014 Materials for Use in H\u2082S-Containing Environments','Sour service only'],
              ['MEP-QC-PROC-012','Torque Wrench Calibration and Control Procedure','Internal \u2014 mandatory'],
              ['MEP-QC-FORM-044A','Flange Connection Torque Record','Field documentation form'],
            ]
          )}
        </Section>

        <Section num="3.0" title="Personnel Qualifications">
          <Clause id="3.1">
            All personnel performing or supervising bolted flange assembly shall have completed MEP-approved flange assembly training within the preceding 36 months. Training records shall be available on request.
          </Clause>
          <Clause id="3.2">
            QC Inspection of bolted flange assemblies shall be performed by a designated QC Inspector. The inspector shall record their full surname and first initial in ALL CAPS on form MEP-QC-FORM-044A (e.g., <strong style={{ color:amber }}>J. SMITH</strong>). Abbreviated or printed-name-only entries are not acceptable.
          </Clause>
          <Clause id="3.3">
            Torque wrenches used in final assembly shall be calibrated per MEP-QC-PROC-012. The wrench identifier and calibration due date shall be recorded on form MEP-QC-FORM-044A prior to use. An expired calibration shall cause all torquing work performed with that wrench since its last valid calibration to be considered nonconforming.
          </Clause>
        </Section>

        <Section num="4.0" title="Material Requirements">
          <Clause id="4.1">
            <strong style={{ color:white }}>Bolting {'\u2014'} General.</strong> Unless otherwise specified on the engineering drawing or piping material class, all stud bolts shall conform to ASTM A193 Grade B7 and all heavy hex nuts shall conform to ASTM A194 Grade 2H. No substitution of bolt or nut grade is permitted without written approval from the project Engineer of Record.
          </Clause>
          <Clause id="4.2">
            <strong style={{ color:white }}>Sour Service.</strong> For piping systems designated Sour Service (H{'\u2082'}S service per NACE MR0175 / ISO 15156), ASTM A193 B7 bolting is acceptable provided hardness does not exceed 35 HRC per heat. Mill Test Reports (MTRs) confirming hardness shall be on file prior to installation. Under no circumstances shall B7M or non-heat-treated material be substituted without EOR approval.
          </Clause>
          <Clause id="4.3">
            <strong style={{ color:white }}>Traceability.</strong> All bolts, nuts, and gaskets shall have documented traceability to a mill heat or lot certificate. The heat number (bolts/nuts) and lot number (gaskets) shall be recorded on MEP-QC-FORM-044A. Material installed without traceable certification is nonconforming and shall be removed.
          </Clause>
          <Clause id="4.4" note>
            Note: Mixed bolt grades (e.g., B7 and B8) within a single flange joint are strictly prohibited. All bolts in a joint shall be from the same specification and grade.
          </Clause>
          <Warn>Do not use galvanized or coated bolting in Class 600 or above service without explicit engineering approval. Hydrogen embrittlement risk is elevated in high-stress sour service applications.</Warn>
        </Section>

        <Section num="5.0" title="Gasket Requirements">
          <Clause id="5.1">
            <strong style={{ color:white }}>Type.</strong> For ASME B16.5 Class 150 through Class 2500 Raised Face (RF) connections in gas, sour gas, or hydrocarbon service, spiral wound gaskets (SWG) conforming to ASME B16.20 shall be used. SWGs shall be furnished with an outer centering ring and an inner retaining ring.
          </Clause>
          <Clause id="5.2">
            <strong style={{ color:white }}>Winding Material.</strong> For sour service or natural gas service at operating temperatures between -29{'\u00B0'}C and 260{'\u00B0'}C (-20{'\u00B0'}F to 500{'\u00B0'}F), the winding material shall be <strong style={{ color:white }}>316 Stainless Steel / Flexible Graphite</strong> (316SS/FG). Ring material shall be carbon steel per ASME B16.20 unless otherwise specified.
          </Clause>
          <Clause id="5.3">
            <strong style={{ color:white }}>Lot Traceability.</strong> Each gasket lot shall be assigned a manufacturer's lot number. This lot number is a required entry on form MEP-QC-FORM-044A. The inspector shall verify the lot number from the gasket packaging label or certificate and record it verbatim. Do not estimate or interpolate lot numbers from adjacent joints.
          </Clause>
          <Clause id="5.4">
            <strong style={{ color:white }}>Inspection Prior to Installation.</strong> Each gasket shall be visually inspected prior to installation. Gaskets exhibiting crushed windings, separated layers, missing rings, scoring on seating surfaces, or corrosion shall be rejected and replaced. Rejected gaskets shall be marked and quarantined.
          </Clause>
          <Clause id="5.5">
            <strong style={{ color:white }}>Single Use Only.</strong> Spiral wound gaskets are single-use items. A gasket removed from a previously assembled joint shall not be reinstalled under any circumstances, regardless of apparent condition.
          </Clause>
          <Clause id="5.6" note>
            Note: Confirm gasket inner diameter (ID) does not restrict bore. The gasket ID shall be equal to or greater than the pipe bore. Oversized ID gaskets protruding into the flow stream are unacceptable and constitute a nonconformance.
          </Clause>
        </Section>

        <Section num="6.0" title="Flange Face Preparation">
          <Clause id="6.1">
            Raised face surfaces shall be inspected for pitting, scoring, radial scratches, or mechanical damage prior to assembly. Defects exceeding 0.8 mm (1/32") depth or crossing the gasket seating area are cause for rejection. Engineering disposition is required before proceeding.
          </Clause>
          <Clause id="6.2">
            The required surface finish for raised face flanges in gas and sour service is <strong style={{ color:white }}>125 to 250 AARH (3.2 to 6.3 {'\u00B5'}m Ra)</strong>. Surface finish shall be verified by visual comparison to a reference coupon. Where doubt exists, profilometer measurement is required.
          </Clause>
          <Clause id="6.3">
            Flange faces shall be clean and free of all foreign material, mill scale, paint, oils (other than assembly lubricant), and debris immediately prior to gasket installation. Cleaning shall be performed with a lint-free cloth and a solvent compatible with the service fluid.
          </Clause>
          <Clause id="6.4">
            <strong style={{ color:white }}>Alignment.</strong> Flanges shall be aligned so that the gap between flange faces is parallel (within 1/16" per 12" of pipe diameter) and the bolt holes are in alignment before any bolts are installed. "Spring-loading" a flange connection to achieve alignment is prohibited. Misalignment shall be corrected by spool adjustment, not by bolt load.
          </Clause>
        </Section>

        <Section num="7.0" title="Lubrication Requirements">
          <Clause id="7.1">
            All bolt threads and bearing faces of nuts shall be lubricated prior to assembly. The approved lubricant for Class 600 and above in sour service applications is <strong style={{ color:white }}>Molykote{'\u00AE'} G-1000 PTFE-based thread paste</strong> or an approved equal as listed on the MEP Qualified Products List (QPL).
          </Clause>
          <Clause id="7.2">
            Lubricant shall be applied to the full engaged thread length and to the underside of the nut bearing face. Excess lubricant shall not be applied such that it contacts the gasket seating face.
          </Clause>
          <Clause id="7.3">
            The nut factor (K) for torque calculations in this specification is based on <strong style={{ color:white }}>K = 0.16</strong>, applicable to lubricated ASTM A193 B7 / A194 2H assemblies. Dry or improperly lubricated assemblies will result in inadequate bolt load despite meeting the torque value {'\u2014'} do not use the torque values in Table 1 without proper lubrication.
          </Clause>
          <Clause id="7.4" note>
            Note: The use of anti-seize compounds containing lead, zinc, or cadmium is prohibited on MEP facilities.
          </Clause>
          <Warn>Applying the torque values in Table 1 to dry (unlubricated) bolting will result in approximately 30{'\u2013'}40% less actual bolt load than intended. This constitutes a latent joint integrity risk and is a nonconformance requiring disassembly and proper reassembly.</Warn>
        </Section>

        <Section num="8.0" title="Bolt Tightening Procedure">
          <Clause id="8.1">
            <strong style={{ color:white }}>General.</strong> Bolt tightening shall be performed in accordance with ASME PCC-1 Appendix F (Recommended Bolt Tightening Sequence) using the cross (star) pattern as defined in clause 8.3 of this specification. No other tightening sequence is permitted without written approval from the QC Authority.
          </Clause>
          <Clause id="8.2">
            <strong style={{ color:white }}>Hand Tightening.</strong> Prior to torque application, all bolts shall be run down by hand until snug. Nuts shall turn freely by hand; any binding shall be investigated (misalignment, thread damage, or wrong bolt length) and corrected before proceeding.
          </Clause>
          <Clause id="8.3">
            <strong style={{ color:white }}>Cross (Star) Pattern.</strong> Number bolts sequentially clockwise from the 12 o'clock position (Bolt 1). Apply torque in the following cross sequence: begin at Bolt 1, proceed to the diametrically opposite bolt, then rotate approximately 90{'\u00B0'} clockwise and proceed to its opposite, continuing until all bolts have been torqued once. This completes one pass. Repeat for each subsequent pass.
          </Clause>
          <Clause id="8.4">
            <strong style={{ color:white }}>Multi-Pass Torquing.</strong> All joints shall be torqued in a minimum number of passes as specified in Table 1. Pass torque levels shall be as follows unless Table 1 specifies otherwise:
          </Clause>
          {specTable(
            ['Pass','% of Final Torque','Purpose'],
            [
              ['Pass 1 \u2014 Snug','35% of Final','Seat gasket, eliminate gap; cross pattern required'],
              ['Pass 2 \u2014 Intermediate','70% of Final','Distribute bolt load uniformly; cross pattern required'],
              ['Pass 3 \u2014 Final','100% of Final','Achieve target bolt load; cross pattern required'],
            ]
          )}
          <TableNote>For NPS 1.5" and smaller in Class 600, a two-pass procedure is permitted: Pass 1 at 50% of final torque, Pass 2 at 100% of final torque, both in cross pattern.</TableNote>
          <Clause id="8.5">
            <strong style={{ color:white }}>Achieved Torque.</strong> The achieved torque is the torque value recorded at the completion of the final pass on the final bolt in the sequence. If any bolt in the final pass is found to advance (move) upon application of the final torque value, the full cross-pattern final pass shall be repeated until no bolt advances. The highest stable torque value applied uniformly across all bolts constitutes the achieved torque.
          </Clause>
          <Clause id="8.6">
            <strong style={{ color:white }}>Over-Torquing.</strong> Torque values shall not exceed the maximum values specified in Table 1 footnotes. If a bolt breaks during torquing, the joint shall be disassembled, all bolts and nuts replaced, and the assembly restarted. Broken bolt stubs shall not be used.
          </Clause>
          <Warn>Do not use impact wrenches for final torque application. Calibrated torque wrenches (click-type or electronic) with a current calibration per MEP-QC-PROC-012 are required for all passes at and above 50% of final torque value.</Warn>
        </Section>

        <Section num="9.0" title="Torque Values — Table 1">
          <Clause id="9.1">
            The following torque values apply to ASME B16.5 Raised Face flanged joints assembled per this specification using ASTM A193 B7 stud bolts, ASTM A194 2H heavy hex nuts, and Molykote{'\u00AE'} G-1000 lubricant (K = 0.16). Values are in <strong style={{ color:amber }}>ft-lb (foot-pounds)</strong>.
          </Clause>
          {specTable(
            ['NPS','Class','Bolt Size','No. Bolts','Pass 1\nSnug (ft-lb)','Pass 2\nInterm. (ft-lb)','Final Torque\n(ft-lb)','Min. Passes','Max. Torque\u00B9\n(ft-lb)'],
            [
              ['\u00BD"','600#','\u00BD" \u00D7 3.25"','4','10','20','28','3','34'],
              ['\u00BE"','600#','\u00BD" \u00D7 3.50"','4','12','25','35','3','42'],
              ['1"','600#','5/8" \u00D7 4.00"','4','18','36','50','3','60'],
              ['1\u00BD"','600#','5/8" \u00D7 4.50"','8','20','\u2014','65','2','78'],
              ['2"','600#','\u00BE" \u00D7 5.25"','8','28','\u2014','75','2','90'],
              ['3"','600#','\u00BE" \u00D7 5.75"','12','40','80','120','3','144'],
              ['4"','600#','7/8" \u00D7 6.25"','16','40','80','120','3','144'],
              ['6"','600#','1" \u00D7 7.25"','16','65','130','185','3','222'],
              ['8"','600#','1\u215B" \u00D7 8.00"','20','90','180','270','3','324'],
              ['10"','600#','1\u00BC" \u00D7 8.75"','24','120','240','360','3','432'],
              ['12"','600#','1\u00BC" \u00D7 9.25"','24','130','260','390','3','468'],
            ],
            [amber, muted, muted, muted, '#8ab4c4', '#8ab4c4', amber, white, muted]
          )}
          <TableNote>{'\u00B9'} Maximum torque is 120% of final torque value. Bolts torqued beyond maximum shall be replaced prior to pressure testing. {'\u2014'} Denotes not applicable (2-pass procedure); for 2-pass joints use 50% of Final for Pass 1.</TableNote>
          <TableNote>This table applies to lubricated assemblies only (K=0.16). Do not apply these values to dry bolting. Class 150 and 300 torque values are in specification MEP-PIP-SPEC-044B.</TableNote>
        </Section>

        <Section num="10.0" title="Inspection & Documentation">
          <Clause id="10.1">
            <strong style={{ color:white }}>Form MEP-QC-FORM-044A</strong> (Flange Connection Torque Record) shall be completed for every bolted flange joint on systems covered by this specification. One form per joint. No joint shall be considered complete for hydrostatic test purposes until its form is signed, dated, and submitted to the project QC file.
          </Clause>
          <Clause id="10.2">
            The QC Inspector shall verify and record the following on MEP-QC-FORM-044A for each joint: (a) joint identification number as shown on the isometric drawing; (b) line size and pressure class; (c) bolt size, material, and heat number; (d) nut material and heat number; (e) gasket type and lot number; (f) lubricant used; (g) torque wrench ID and calibration due date; (h) achieved torque value at final pass; (i) tightening pattern; (j) number of passes; (k) date, shift, and inspector initials.
          </Clause>
          <Clause id="10.3">
            <strong style={{ color:white }}>Result Classification.</strong> A joint shall be classified ACC (Accepted) when: all above items are documented, achieved torque equals the final torque value from Table 1 {'\u00B1'}5%, no bolt was found not to advance during re-check, and no visible leakage or gasket extrusion is present. Any other condition shall be classified REJ (Rejected) pending Engineering disposition.
          </Clause>
          <Clause id="10.4">
            The inspector shall record their identification as <strong style={{ color:amber }}>INITIALS. SURNAME in all capital letters</strong> (e.g., J. SMITH). This format is required for traceability to the individual's qualification record.
          </Clause>
          <Clause id="10.5" note>
            Note: Photocopied, pre-filled, or faxed forms are not acceptable as original quality records. Entries shall be made in permanent ink. Errors shall be crossed out with a single line, corrected, and initialed {'\u2014'} not obliterated with correction fluid.
          </Clause>
        </Section>

        <Section num="11.0" title="Re-Torque Requirements">
          <Clause id="11.1">
            All Class 600 and above joints in gas, sour gas, or hydrocarbon service shall be re-torqued within 24 hours of initial assembly or following the first thermal cycle above 65{'\u00B0'}C (150{'\u00B0'}F), whichever occurs first. Re-torquing shall use the same final torque value and cross pattern as initial assembly.
          </Clause>
          <Clause id="11.2">
            If any bolt advances (moves) during re-torquing, the full cross-pattern final pass shall be completed until no bolt advances. The re-torque event and result shall be documented on MEP-QC-FORM-044A in the Remarks field.
          </Clause>
          <Clause id="11.3" note>
            Note: Re-torque is not required for Class 150 or 300 ambient-temperature non-cyclic service. Consult the QC Authority for non-standard service conditions.
          </Clause>
        </Section>

        <Section num="12.0" title="Nonconformance">
          <Clause id="12.1">
            Any joint not meeting the requirements of this specification shall be identified as a Nonconformance (NCR) and shall not be hydrotested or placed in service until the NCR has been dispositioned by the Engineer of Record and QC Authority. Disposition options are: Use-As-Is (requires documented engineering justification), Rework, or Reject/Replace.
          </Clause>
          <Clause id="12.2">
            Common nonconformances include, but are not limited to: missing MTR or gasket lot documentation; achieved torque outside {'\u00B1'}5% of final value; use of un-calibrated torque wrench; misalignment exceeding clause 6.4 tolerance; re-use of a spiral wound gasket; use of unapproved lubricant; and incomplete form MEP-QC-FORM-044A.
          </Clause>
        </Section>

        {/* Footer */}
        <div style={{ borderTop:`1px solid ${border}`, padding:'8px 10px', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'8px', background:'#080c07', marginTop:'8px' }}>
          <div style={{ color:muted, fontSize:'7.5px' }}>
            MEP-PIP-SPEC-044 Rev. 3<br/>
            Mustang Energy Partners, LLC
          </div>
          <div style={{ color:muted, fontSize:'7.5px', textAlign:'center' }}>
            CONTROLLED DOCUMENT<br/>
            Printed copies are uncontrolled
          </div>
          <div style={{ color:muted, fontSize:'7.5px', textAlign:'right' }}>
            Issued: 2024-11-15<br/>
            Next Review: 2026-11-15
          </div>
        </div>

      </div>
    </div>
  );
}

/* ── PreAssemblyForm ─────────────────────────────────────────── */
function PreAssemblyForm({ config, onComplete }) {
  const step = config.steps[0];
  const SCORED_FIELDS = step.scored_fields;
  const SECTIONS = step.sections;
  const FORM_ANSWERS = step.answers;
  const SCORED_JOINT = step.scored_joint;
  const flexMatchers = step.flexible_matchers;
  const scenario = config.scenario;

  const [activeJoint, setActiveJoint] = useState(SCORED_JOINT);
  const [formData, setFormData] = useState(() =>
    Object.fromEntries(scenario.joints.map(j => [
      j.id,
      Object.fromEntries(SCORED_FIELDS.map(f => [f.key, '']))
    ]))
  );
  const [submitted, setSubmitted] = useState(false);
  const [scores, setScores] = useState(null);
  const [totalScore, setTotalScore] = useState(null);
  const inputRefs = useRef({});

  const joint = scenario.joints.find(j => j.id === activeJoint);

  const update = (jid, key, val) =>
    setFormData(p => ({ ...p, [jid]: { ...p[jid], [key]: val } }));

  const allFilled = SCORED_FIELDS.every(f =>
    formData[SCORED_JOINT][f.key].trim() !== ''
  );

  const handleSubmit = () => {
    let totalCor = 0, totalFields = 0;
    const sc = {};
    const j = SCORED_JOINT;
    sc[j] = {};
    SCORED_FIELDS.forEach(f => {
      totalFields++;
      const ok = checkFormField(f.key, formData[j][f.key], FORM_ANSWERS[j][f.key], flexMatchers);
      if (ok) totalCor++;
      sc[j][f.key] = { ok, entered: formData[j][f.key], correct: FORM_ANSWERS[j][f.key] };
    });
    setScores(sc);
    setTotalScore(Math.round((totalCor / totalFields) * 100));
    setSubmitted(true);
  };

  const reset = () => {
    setFormData(Object.fromEntries(scenario.joints.map(j => [
      j.id,
      Object.fromEntries(SCORED_FIELDS.map(f => [f.key, '']))
    ])));
    setSubmitted(false);
    setScores(null);
    setTotalScore(null);
  };

  const passed = totalScore !== null && totalScore >= config.passing_score;

  const sourceHints = {
    bolting: '\u2192 See Mill Test Reports (MTR tab)',
    gasket: '\u2192 See MTR tab (Gasket Cert) and Bill of Materials on ISO Drawing',
    flange: '\u2192 See Mill Test Reports \u2014 Flanges Heat A or B (note: cert varies by joint)',
    install: '\u2192 See Company Spec (MEP-PIP-SPEC-044) \u00A77.1, \u00A78.1\u20138.4, Table 1',
    equip: '\u2192 See Calibration Certificate (Cal Cert tab)',
  };

  const FormInput = ({ jid, fieldKey, hint }) => {
    const jidKey = SCORED_JOINT;
    const ck = `${jidKey}|${fieldKey}`;
    const fr = submitted && scores?.[jidKey]?.[fieldKey];
    let bgColor = 'transparent', outline = 'transparent';
    if (submitted) {
      bgColor = fr?.ok ? 'rgba(82,163,102,0.08)' : 'rgba(201,95,95,0.08)';
      outline = fr?.ok ? 'rgba(82,163,102,0.4)' : 'rgba(201,95,95,0.35)';
    }
    return (
      <div style={{ outline:`1.5px solid ${outline}`, background:bgColor }}>
        <input
          ref={el => { if (el) inputRefs.current[ck] = el; }}
          value={formData[jidKey][fieldKey]}
          disabled={submitted}
          onChange={e => update(jidKey, fieldKey, e.target.value)}
          placeholder={hint}
          style={{
            width:'100%', background:'transparent', border:'none', outline:'none',
            color: submitted ? (fr?.ok ? green : red) : white,
            padding:'5px 8px', fontSize:'10px', fontFamily:mono,

          <div style={{ padding:'0 8px 4px', fontSize:'8px', color:green }}>

          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ fontFamily:mono }}>
      {/* Form header */}
      <div style={{ background:'rgba(212,131,42,0.08)', border:`1px solid ${border}`, borderTop:`2px solid ${amber}`, padding:'8px 12px', marginBottom:'12px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div>
            <div style={{ color:amber, fontSize:'8px', letterSpacing:'0.18em', textTransform:'uppercase', marginBottom:'3px' }}>
              Mustang Energy Partners, LLC
            </div>
            <div style={{ color:white, fontSize:'12px', fontWeight:700, letterSpacing:'0.04em' }}>
              FLANGE CONNECTION TORQUE RECORD
            </div>
            <div style={{ color:muted, fontSize:'8px', marginTop:'2px' }}>
              MEP-QC-FORM-044A Rev. 3 {'\u00B7'} Pre-Assembly Section
            </div>
          </div>
          <div style={{ textAlign:'right' }}>
            <div style={{ color:muted, fontSize:'7.5px', textTransform:'uppercase', letterSpacing:'0.1em' }}>Form No.</div>
            <div style={{ color:amber, fontSize:'11px', fontWeight:700 }}>MEP-QC-FORM-044A</div>
            <div style={{ color:muted, fontSize:'7.5px', marginTop:'2px' }}>{config.project}</div>
            <div style={{ color:muted, fontSize:'7.5px' }}>{config.system}</div>
          </div>
        </div>
        <div style={{ marginTop:'8px', padding:'6px 8px', background:'rgba(0,0,0,0.3)', border:`1px solid ${border}`, fontSize:'8.5px', color:'#8ab4c4', fontStyle:'italic' }}>
          <span style={{ color:'#8ab4c4', fontWeight:700, marginRight:'6px' }}>INSTRUCTIONS:</span>
          Complete all fields below using the ISO Drawing, Bill of Materials, Mill Test Reports, Calibration Certificate, and Company Specification (MEP-PIP-SPEC-044). Do NOT fill in Achieved Torque, Date, or Result {'\u2014'} those are recorded after physical assembly is complete.
        </div>
      </div>

      {/* Score banner */}
      {submitted && (
        <div style={{
          background: passed ? 'rgba(82,163,102,0.1)' : 'rgba(201,95,95,0.08)',
          border: `1px solid ${passed ? 'rgba(82,163,102,0.3)' : 'rgba(201,95,95,0.3)'}`,
          padding:'9px 12px', marginBottom:'12px',
          display:'flex', justifyContent:'space-between', alignItems:'center'
        }}>
          <span style={{ color: passed ? green : red, fontWeight:700, fontSize:'12px' }}>
            Step 1 {passed ? '\u2713 PASSED' : '\u2717 NOT PASSED'} {'\u2014'} {totalScore}% on {SCORED_JOINT}
            <span style={{ color:muted, fontSize:'9px', fontWeight:400, marginLeft:'8px' }}>
              Min. {config.passing_score}% required. Incorrect fields shown in red with correct answers in green.
            </span>
          </span>
          <div style={{ display:'flex', gap:'8px' }}>
            {!passed && (
              <button onClick={reset} style={{
                background:'none', border:`1px solid ${border}`, color:muted,
                padding:'5px 10px', cursor:'pointer', fontFamily:mono,
                fontSize:'8px', letterSpacing:'0.1em', textTransform:'uppercase'
              }}>Retry</button>
            )}
            {passed && (
              <button onClick={() => onComplete()} style={{
                background:amber, color:bg, border:'none',
                padding:'7px 14px', cursor:'pointer', fontFamily:mono,
                fontSize:'9px', letterSpacing:'0.1em', textTransform:'uppercase', fontWeight:700
              }}>Proceed to Torque Log {'\u2192'}</button>
            )}

      {/* Joint identification section */}
      <div style={{ border:`1px solid ${border}`, marginBottom:'8px', background:surf }}>
        <div style={{ padding:'5px 10px', background:'rgba(255,255,255,0.03)', borderBottom:`1px solid ${border}` }}>
          <span style={{ color:muted, fontSize:'7.5px', letterSpacing:'0.14em', textTransform:'uppercase' }}>
            Joint Identification <span style={{ color:muted, marginLeft:'8px' }}>(from Isometric Drawing {'\u2014'} pre-populated)</span>
          </span>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr' }}>
          {[['Joint ID', joint.id],['Location', joint.location],['Line Size', joint.size],['Pressure Class','600#'],['Fluid Service', config.service]].map(([l,v], i) => (
            <div key={l} style={{ padding:'6px 10px', borderRight: i < 4 ? `1px solid ${border}` : 'none' }}>
              <div style={{ color:muted, fontSize:'7px', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:'2px' }}>{l}</div>
              <div style={{ color:'#4a6a52', fontSize:'10px', fontWeight:600 }}>{v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Scored field sections */}
      {SECTIONS.map(sec => {
        const fields = SCORED_FIELDS.filter(f => f.section === sec.id);
        return (
          <div key={sec.id} style={{ border:`1px solid ${border}`, marginBottom:'8px', background:surf }}>

              <span style={{ color:sec.color, fontSize:'7.5px', letterSpacing:'0.14em', textTransform:'uppercase' }}>
                {sec.label}

/* ── TorqueLogGrid ─────────────────────────────────────────────── */
function TorqueLogGrid({ config, onComplete }) {
  const COLS = config.steps[1].columns;
  const ANSWERS = config.steps[1].answers;
  const scenario = config.scenario;

  const [cells, setCells] = useState(() =>
    Object.fromEntries(scenario.joints.map(j => [
      j.id,
      Object.fromEntries(COLS.map(c => [c.key, '']))
    ]))
  );
  const [submitted, setSubmitted] = useState(false);
  const [score, setScore] = useState(null);
  const [results, setResults] = useState(null);
  const [hints, setHints] = useState(false);
  const [activeCell, setActiveCell] = useState(null);
  const inputRefs = useRef({});

  const update = (jid, key, val) =>
    setCells(p => ({ ...p, [jid]: { ...p[jid], [key]: val } }));

  const allFilled = scenario.joints.every(j =>
    COLS.every(c => cells[j.id][c.key].trim() !== '')
  );

  const submit = () => {
    let tot = 0, cor = 0;
    const r = {};
    scenario.joints.forEach(j => {
      r[j.id] = {};
      COLS.forEach(c => {
        tot++;
        const u = cells[j.id][c.key].trim().toUpperCase();
        const a = ANSWERS[j.id][c.key].toUpperCase();
        const ok = u === a;
        if (ok) cor++;
        r[j.id][c.key] = { ok, u, a };
      });
    });
    setResults(r);
    setScore(Math.round((cor / tot) * 100));
    setSubmitted(true);
  };

  const retry = () => {
    setCells(Object.fromEntries(scenario.joints.map(j => [
      j.id,
      Object.fromEntries(COLS.map(c => [c.key, '']))
    ])));
    setSubmitted(false);
    setScore(null);
    setResults(null);
    setHints(false);
  };

  const passed = score !== null && score >= (config.passing_score || 80);

  const navToNext = (ck) => {
    const all = scenario.joints.flatMap(j =>
      COLS.map(c => `${j.id}|${c.key}`)
    );
    const next = all[all.indexOf(ck) + 1];
    if (next && inputRefs.current[next]) inputRefs.current[next].focus();
  };

  return (
    <div>
      {/* Log header */}
      <div style={{
        background:surf, border:`1px solid ${border}`, borderTop:`2px solid ${amber}`,
        padding:'10px 12px', marginBottom:'10px',
        display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'8px'
      }}>
        {[['Project', config.project],['System', config.system],['Procedure', config.scenario.procedure],
          ['Spec', config.scenario.spec],['Service', config.service],['Date','___________']].map(([l,v]) => (
          <div key={l}>
            <div style={{ color:amber, fontSize:'7px', letterSpacing:'0.14em', textTransform:'uppercase', marginBottom:'1px' }}>{l}</div>
            <div style={{ color:white, fontSize:'10px' }}>{v}</div>
          </div>
        ))}
      </div>

      {/* Score/result banner */}
      {submitted && (
        <div style={{
          background: passed ? 'rgba(82,163,102,0.12)' : 'rgba(201,95,95,0.1)',
          border: `1px solid ${passed ? 'rgba(82,163,102,0.35)' : 'rgba(201,95,95,0.3)'}`,
          padding:'9px 12px', marginBottom:'10px',
          display:'flex', justifyContent:'space-between', alignItems:'center'
        }}>
          <span style={{ color: passed ? green : red, fontWeight:700, fontSize:'12px' }}>
            {passed ? '\u2713 PASSED' : '\u2717 NOT PASSED'} \u2014 {score}%
            <span style={{ color:muted, fontSize:'10px', fontWeight:400, marginLeft:'8px' }}>
              {passed ? 'Min. 80% required.' : 'Correct answers shown below cells.'}
            </span>
          </span>
          {!passed && (
            <button onClick={retry} style={{
              background:'none', border:`1px solid ${border}`, color:muted,
              padding:'5px 10px', cursor:'pointer', fontFamily:mono,
              fontSize:'9px', letterSpacing:'0.1em', textTransform:'uppercase'
            }}>Retry</button>
          )}
        </div>
      )}

      {/* Table */}
      <div style={{ overflowX:'auto', background:surf, border:`1px solid ${border}` }}>
        <table style={{ borderCollapse:'collapse', fontSize:'11px', width:'100%' }}>
          <thead>
            <tr style={{ background:surf2 }}>
              <th style={{
                padding:'7px 8px', textAlign:'left', color:muted, fontSize:'8px',
                letterSpacing:'0.08em', textTransform:'uppercase',
                borderBottom:`2px solid ${border}`, borderRight:`1px solid ${border}`,
                fontWeight:500, whiteSpace:'nowrap'
              }}>Joint</th>
              <th style={{
                padding:'7px 8px', textAlign:'left', color:muted, fontSize:'8px',
                letterSpacing:'0.08em', textTransform:'uppercase',
                borderBottom:`2px solid ${border}`, borderRight:`1px solid ${border}`,
                fontWeight:500, whiteSpace:'nowrap'
              }}>Location</th>
              <th style={{
                padding:'7px 8px', textAlign:'left', color:muted, fontSize:'8px',
                letterSpacing:'0.08em', textTransform:'uppercase',
                borderBottom:`2px solid ${border}`, borderRight:`1px solid ${border}`,
                fontWeight:500, whiteSpace:'nowrap'
              }}>Target</th>
              {COLS.map((col, ci) => (
                <th key={col.key} style={{
                  padding:'7px 8px', textAlign:'left', color:amber, fontSize:'8px',
                  letterSpacing:'0.08em', textTransform:'uppercase',
                  borderBottom:`2px solid ${amber}`,
                  borderRight: ci < COLS.length - 1 ? `1px solid ${border}` : 'none',
                  fontWeight:600, whiteSpace:'pre-line', minWidth:'72px'
                }}>
                  {col.label}
                  {hints && !submitted && (
                    <div style={{ color:'#3d3f39', fontSize:'7px', fontWeight:400, marginTop:'1px' }}>{col.hint}</div>
                  )}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {scenario.joints.map((j, ri) => (
              <tr key={j.id} style={{
                borderBottom:`1px solid ${border}`,
                background: ri % 2 === 0 ? 'transparent' : '#1a1c18'
              }}>
                <td style={{
                  padding:'0 8px', height:'42px', color:amber, fontWeight:600,
                  borderRight:`1px solid ${border}`, whiteSpace:'nowrap', fontSize:'11px'
                }}>{j.id}</td>
                <td style={{
                  padding:'0 8px', color:textCol, fontSize:'11px',
                  borderRight:`1px solid ${border}`, whiteSpace:'nowrap'
                }}>{j.location}</td>
                <td style={{
                  padding:'0 8px', color:white, fontWeight:600,
                  borderRight:`1px solid ${border}`, whiteSpace:'nowrap'
                }}>{j.target} ft\u00b7lb</td>
                {COLS.map((col, ci) => {
                  const ck = `${j.id}|${col.key}`;
                  const fr = submitted && results?.[j.id]?.[col.key];
                  let outlineColor = 'transparent', cellBg = 'transparent';
                  if (activeCell === ck && !submitted) {
                    outlineColor = amber;
                    cellBg = 'rgba(212,131,42,0.08)';
                  }
                  if (submitted) {
                    cellBg = fr?.ok ? 'rgba(82,163,102,0.1)' : 'rgba(201,95,95,0.08)';
                    outlineColor = fr?.ok ? 'rgba(82,163,102,0.4)' : 'rgba(201,95,95,0.4)';
                  }
                  return (
                    <td key={col.key} style={{
                      padding:0,
                      borderRight: ci < COLS.length - 1 ? `1px solid ${border}` : 'none'
                    }}>
                      <div style={{
                        outline:`2px solid ${outlineColor}`, outlineOffset:'-2px',
                        background:cellBg, minHeight:'42px',
                        display:'flex', flexDirection:'column', justifyContent:'center'
                      }}>
                        <input
                          ref={el => { if (el) inputRefs.current[ck] = el; }}
                          value={cells[j.id][col.key]}
                          disabled={submitted}
                          onChange={e => update(j.id, col.key, e.target.value)}
                          onFocus={() => setActiveCell(ck)}
                          onBlur={() => setActiveCell(null)}
                          onKeyDown={e => {
                            if (e.key === 'Tab' || e.key === 'Enter') {
                              e.preventDefault();
                              navToNext(ck);
                            }
                          }}
                          placeholder={hints && !submitted ? col.hint : ''}
                          style={{
                            width:'100%', background:'transparent', border:'none', outline:'none',
                            color: submitted ? (fr?.ok ? green : red) : white,
                            padding:'8px', fontSize:'11px', fontFamily:mono,
                            cursor: submitted ? 'default' : 'text', boxSizing:'border-box'
                          }}
                        />
                        {submitted && fr && !fr.ok && (
                          <div style={{ padding:'0 8px 5px', fontSize:'8px', color:green, letterSpacing:'0.06em' }}>
                            \u2713 {fr.a}
                          </div>
                        )}
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ color:'#3d3f39', fontSize:'8px', marginTop:'5px', letterSpacing:'0.1em' }}>
        TAB or ENTER to advance
      </div>

      {/* Submit / Complete / Retry */}
      <div style={{ marginTop:'14px', display:'flex', justifyContent:'flex-end', gap:'10px', alignItems:'center' }}>
        {!submitted && !allFilled && (
          <span style={{ color:muted, fontSize:'9px' }}>Fill all cells to submit</span>
        )}
        {!submitted && (
          <button onClick={submit} disabled={!allFilled} style={{
            background: allFilled ? amber : '#232520',
            color: allFilled ? bg : '#3d3f39',
            border:'none', padding:'10px 20px',
            cursor: allFilled ? 'pointer' : 'not-allowed',
            fontFamily:mono, fontSize:'11px',
            letterSpacing:'0.12em', textTransform:'uppercase', fontWeight:600,
            opacity: allFilled ? 1 : 0.4
          }}>Submit Log</button>
        )}
        {submitted && passed && (
          <button onClick={() => onComplete(score, true, { cells })} style={{
            background:green, color:bg, border:'none',
            padding:'10px 20px', cursor:'pointer',
            fontFamily:mono, fontSize:'11px',
            letterSpacing:'0.12em', textTransform:'uppercase', fontWeight:600
          }}>Exercise Complete \u2713</button>
        )}
      </div>
    </div>
  );
}
