<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're In | Field-Driven Quality</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111210; --surface: #1a1c19; --surface2: #222420; --border: #2e3129;
      --text: #ddd9cf; --muted: #888880; --amber: #d4832a; --amber-lt: #e8a04a;
      --amber-dk: #a0601c; --steel: #3d5a72; --white: #f2ede4;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif;
      font-weight: 400; font-size: 17px; line-height: 1.65; -webkit-font-smoothing: antialiased;
    }
    nav {
      position: sticky; top: 0; z-index: 100; background: rgba(17, 18, 16, 0.92);
      backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
      padding: 0 clamp(1.5rem, 5vw, 4rem); display: flex; align-items: center;
      justify-content: space-between; height: 60px;
    }
    .nav-logo {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.3rem;
      letter-spacing: 0.08em; color: var(--amber); text-decoration: none; text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-hamburger {
      display: none; flex-direction: column; gap: 5px; background: none;
      border: none; cursor: pointer; padding: 4px;
    }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--muted); transition: all 0.25s; }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    @media (max-width: 640px) {
      .nav-links {
        display: none; position: absolute; top: 60px; left: 0; right: 0;
        background: rgba(17, 18, 16, 0.98); border-bottom: 1px solid var(--border);
        flex-direction: column; gap: 0; padding: 0.5rem 0;
      }
      .nav-links.open { display: flex; }
      .nav-links li a { display: block; padding: 0.9rem clamp(1.5rem, 5vw, 4rem); border-bottom: 1px solid var(--border); }
      .nav-hamburger { display: flex; }
      .nav-cta { display: none; }
    }
    .nav-cta {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase; background: var(--amber);
      color: var(--bg); padding: 0.45rem 1.1rem; text-decoration: none; transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--amber-lt); }

    .center-wrap {
      min-height: calc(100vh - 60px); display: flex; align-items: center;
      justify-content: center; padding: 3rem clamp(1.5rem, 5vw, 4rem);
    }
    .center-box { width: 100%; max-width: 520px; text-align: center; }
    .center-box h1 {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
      font-size: clamp(2.5rem, 6vw, 4rem); text-transform: uppercase;
      color: var(--white); margin-bottom: 1rem;
    }
    .center-box h1 em { font-style: normal; color: var(--amber); }
    .center-sub {
      font-size: 1rem; color: var(--muted); line-height: 1.7; margin-bottom: 2.5rem;
    }
    .btn-row { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase; background: var(--amber);
      color: var(--bg); padding: 0.9rem 2rem; text-decoration: none; display: inline-block;
      transition: background 0.2s, transform 0.15s; border: none; cursor: pointer;
    }
    .btn-primary:hover { background: var(--amber-lt); transform: translateY(-1px); }
    .btn-secondary {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase; background: transparent;
      color: var(--muted); padding: 0.9rem 2rem; text-decoration: none; display: inline-block;
      border: 1px solid var(--border); transition: color 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover { color: var(--white); border-color: var(--muted); }

    footer {
      border-top: 1px solid var(--border); padding: 2.5rem clamp(1.5rem, 5vw, 4rem);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
    }
    footer .footer-logo {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.05rem;
      letter-spacing: 0.08em; color: var(--amber); text-transform: uppercase;
    }
    footer .footer-copy {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em;
      color: var(--muted); text-transform: uppercase;
    }
    footer .footer-links { display: flex; gap: 1.5rem; list-style: none; }
    footer .footer-links a {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); text-decoration: none;
    }
    footer .footer-links a:hover { color: var(--white); }
    @media (max-width: 480px) {
      footer { flex-direction: column; align-items: flex-start; gap: 1.2rem; }
    }

    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">FDQ</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="/about/">What is FDQ</a></li>
    <li><a href="/blog/">Blog</a></li>
    <li><a href="/contact/">Contact</a></li>
  </ul>
  <a href="/accounts/login/" class="nav-cta">Login</a>
  <button class="nav-hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="center-wrap">
  <div class="center-box reveal">
    <h1>You're <em>in.</em></h1>
    <p class="center-sub">Check your email to set your password and access your certification. If you already have an account, log in to get started.</p>
    <div class="btn-row">
      <a href="{% url 'accounts:login' %}" class="btn-primary">Log In</a>
      <a href="/" class="btn-secondary">Return Home</a>
    </div>
  </div>
</div>

<footer>
  <span class="footer-logo">Field-Driven Quality</span>
  <ul class="footer-links">
    <li><a href="/about/">About</a></li>
    <li><a href="/blog/">Blog</a></li>
    <li><a href="/contact/">Contact</a></li>
    <li><a href="/accounts/login/">Login</a></li>
  </ul>
  <span class="footer-copy">&copy; 2025 Field-Driven Quality</span>
</footer>

<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => { hamburger.classList.toggle('open'); navLinks.classList.toggle('open'); });
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
