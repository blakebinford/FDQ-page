{% extends 'base.html' %}

{% block title %}Sign In | Field-Driven Quality{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-box reveal">
    <p class="login-logo">FDQ</p>
    <p class="login-tagline">Your certification portal</p>
    {% if error %}
      <ul class="error-list">
        <li>{{ error }}</li>
      </ul>
    {% endif %}
    <form class="login-form" action="{% url 'accounts:login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" method="POST">
      {% csrf_token %}
      <div class="lf-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@company.com" required />
      </div>
      <div class="lf-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn-primary" style="width:100%;text-align:center;margin-top:0.5rem;">Sign In</button>
    </form>
    <div class="login-divider"></div>
    <p class="login-link">No account yet? <a href="{% url 'accounts:register' %}">Create an account</a></p>
    <p class="login-link" style="margin-top:0.7rem;"><a href="{% url 'accounts:password_reset' %}">Forgot your password?</a></p>
  </div>
</div>
{% endblock %}
